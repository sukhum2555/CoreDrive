<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — NAS Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #0f172a;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 0.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px 36px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon {
      width: 40px; height: 40px; background: #2563eb;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 20px; font-weight: 600; color: #0f172a; }
    .logo-sub { font-size: 12px; color: #64748b; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; height: 40px;
      border: 0.5px solid #d1d5db; border-radius: 8px;
      padding: 0 12px; font-size: 14px; font-family: inherit;
      outline: none; color: #0f172a; background: #fff;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .btn-login {
      width: 100%; height: 40px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .errors { background: #fef2f2; border: 0.5px solid #fecaca; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #dc2626; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
          <path d="M2 20h20v-2H2v2zm2-4h16v-2H4v2zm0-4h16v-2H4v2zm0-8v6h16V4H4z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">NAS Drive</div>
        <div class="logo-sub">ระบบจัดการไฟล์ส่วนตัว</div>
      </div>
    </div>

    <h2>เข้าสู่ระบบ</h2>
    <p class="sub">กรอกข้อมูลเพื่อเข้าใช้งาน NAS Drive</p>

    {% if rate_limit_error %}
    <div class="errors" style="background:#fef2f2;border-color:#fecaca;color:#dc2626">
      🔒 {{ rate_limit_error }}
    </div>
    {% elif form.errors %}
    <div class="errors">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">ชื่อผู้ใช้</label>
        <input type="text" id="id_username" name="username" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="id_password">รหัสผ่าน</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:13px;color:#64748b">
      ยังไม่มีบัญชี? <a href="{% url 'register' %}" style="color:#2563eb;font-weight:500;text-decoration:none">สมัครสมาชิก</a>
    </p>
  </div>
</body>
</html>
