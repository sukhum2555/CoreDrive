<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>เข้าสู่ระบบ — NAS Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh; min-height: 100dvh;
      background: #f8fafc;
      font-family: 'Sarabun', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }

    .logo-wrap { text-align: center; margin-bottom: 40px; }
    .logo-icon {
      width: 72px; height: 72px;
      background: #2563eb; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.25);
    }
    .logo-name { font-size: 24px; font-weight: 700; color: #0f172a; }
    .logo-sub  { font-size: 14px; color: #64748b; margin-top: 4px; }

    .card {
      width: 100%; max-width: 380px;
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .card-title { font-size: 18px; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
    .card-sub   { font-size: 13px; color: #64748b; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 500;
      color: #374151; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; height: 48px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 12px; padding: 0 16px;
      color: #0f172a; font-size: 16px; font-family: inherit;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }
    .form-input::placeholder { color: #94a3b8; }

    .btn-primary {
      width: 100%; height: 52px; margin-top: 8px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-primary:active { background: #1d4ed8; transform: scale(0.98); }

    .error-msg {
      background: #fef2f2; border: 1.5px solid #fecaca;
      color: #dc2626; padding: 12px 16px; border-radius: 12px;
      font-size: 13px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    .divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }

    .footer-link { text-align: center; font-size: 14px; color: #64748b; }
    .footer-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="white" width="32" height="32">
        <path d="M2 20h20v-2H2v2zm2-4h16v-2H4v2zm0-4h16v-2H4v2zm0-8v6h16V4H4z"/>
      </svg>
    </div>
    <div class="logo-name">NAS Drive</div>
    <div class="logo-sub">ระบบจัดเก็บไฟล์ส่วนตัว</div>
  </div>

  <div class="card">
    <div class="card-title">เข้าสู่ระบบ</div>
    <div class="card-sub">ยินดีต้อนรับกลับ</div>

    {% if rate_limit_error %}
    <div class="error-msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      {{ rate_limit_error }}
    </div>
    {% elif form.errors %}
    <div class="error-msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label class="form-label">ชื่อผู้ใช้</label>
        <input type="text" name="username" class="form-input"
               placeholder="กรอกชื่อผู้ใช้"
               autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input type="password" name="password" class="form-input"
               placeholder="กรอกรหัสผ่าน"
               autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">เข้าสู่ระบบ</button>
    </form>

    {% if allow_register %}
    <hr class="divider">
    <div class="footer-link">
      ยังไม่มีบัญชี? <a href="{% url 'register' %}">สมัครสมาชิก</a>
    </div>
    {% endif %}
  </div>

</body>
</html>
